name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: short

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # fmt — fails fast on style drift
  # ---------------------------------------------------------------------------
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.88.0
          components: rustfmt
      - run: cargo fmt --all -- --check

  # ---------------------------------------------------------------------------
  # clippy — lint at deny-warnings for the workspace
  # ---------------------------------------------------------------------------
  clippy:
    name: clippy
    runs-on: ubuntu-latest
    env:
      SQLX_OFFLINE: "true"
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.88.0
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  # ---------------------------------------------------------------------------
  # test — unit tests against ephemeral Postgres
  #
  # Migrations are applied via psql (preinstalled on ubuntu-latest runners)
  # rather than sqlx-cli, avoiding MSRV drift in sqlx-cli's dep graph.
  #
  # SQLX_OFFLINE=true tells the sqlx::migrate!() compile-time macro to skip
  # its DB connection check. The macro only ships migration data into the
  # binary; the actual apply is done by the psql step below.
  # ---------------------------------------------------------------------------
  test:
    name: cargo test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: mobydb
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: mobydb_render_ci
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U mobydb"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://mobydb:ci@localhost:5432/mobydb_render_ci
      TENANT_ID_DEFAULT: 00000000-0000-0000-0000-000000000001
      TENANCY_SESSION_VAR: app.current_tenant_id
      DATABASE_MIGRATE_ON_START: "0"
      ENV: test
      SQLX_OFFLINE: "true"
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.88.0
      - uses: Swatinem/rust-cache@v2
      - name: Apply migrations (via psql)
        env:
          PGPASSWORD: ci
        run: |
          psql -h localhost -U mobydb -d mobydb_render_ci \
               -v ON_ERROR_STOP=1 \
               -f migrations/0001_initial_schema.sql
      - name: Build workspace
        run: cargo build --workspace --all-targets --locked
      - name: Run tests (library unit tests)
        run: cargo test --workspace --lib --locked -- --nocapture

  # ---------------------------------------------------------------------------
  # docker — sanity-check the production Dockerfile builds
  # ---------------------------------------------------------------------------
  docker:
    name: docker build
    runs-on: ubuntu-latest
    needs: [fmt, clippy]
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: mobydb-render-engine:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            GIT_SHA=${{ github.sha }}

  # ---------------------------------------------------------------------------
  # Deferred: cargo-deny (license + advisory audit)
  #
  # Re-introduce in Week 7 (compliance package) with a properly configured
  # deny.toml that allowlists our real license set (MIT, Apache-2.0,
  # BSD-3-Clause, ISC, MPL-2.0, Unicode-3.0, CC0-1.0, etc.).
  # ---------------------------------------------------------------------------
