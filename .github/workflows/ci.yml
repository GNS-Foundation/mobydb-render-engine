name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: short
  # Do NOT put DATABASE_URL here — tests that need it get it from the
  # ephemeral Postgres service job below.

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # fmt — fails fast on style drift
  # ---------------------------------------------------------------------------
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.88.0
          components: rustfmt
      - run: cargo fmt --all -- --check

  # ---------------------------------------------------------------------------
  # clippy — lint at deny-warnings for the workspace
  # ---------------------------------------------------------------------------
  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.88.0
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  # ---------------------------------------------------------------------------
  # test — unit + integration with ephemeral Postgres (mimics MobyDB shape)
  # ---------------------------------------------------------------------------
  test:
    name: cargo test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: mobydb
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: mobydb_render_ci
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U mobydb"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://mobydb:ci@localhost:5432/mobydb_render_ci
      TENANT_ID_DEFAULT: 00000000-0000-0000-0000-000000000001
      TENANCY_SESSION_VAR: app.current_tenant_id
      DATABASE_MIGRATE_ON_START: "1"
      ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.88.0
      - uses: Swatinem/rust-cache@v2
      - name: Install sqlx-cli (for migration check)
        run: cargo install sqlx-cli --version 0.8 --no-default-features --features rustls,postgres --locked
      - name: Apply migrations
        run: sqlx migrate run
      - name: Build workspace
        run: cargo build --workspace --all-targets --locked
      - name: Run tests
        run: cargo test --workspace --all-features --locked -- --nocapture

  # ---------------------------------------------------------------------------
  # deny — catch advisories + banned deps + license violations early
  # ---------------------------------------------------------------------------
  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    continue-on-error: true   # advisories change; don't block PRs on them initially
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2

  # ---------------------------------------------------------------------------
  # docker — sanity-check the production Dockerfile builds
  # ---------------------------------------------------------------------------
  docker:
    name: docker build
    runs-on: ubuntu-latest
    needs: [fmt, clippy]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: mobydb-render-engine:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            GIT_SHA=${{ github.sha }}
